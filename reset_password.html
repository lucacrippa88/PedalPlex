<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - PedalPlex</title>
  <link rel="icon" href="logos/pedalplex_logo_gradient.png" type="image/x-icon">
  <link rel="stylesheet" href="css/carbon-components.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container" style="margin-top:80px; max-width: 400px; margin-left: auto; margin-right: auto; text-align: center;">
  <h2>Reset Password</h2>
  <br>

  <form id="resetForm" style="max-width: 400px; margin: auto;">
    <input type="password" id="newPassword" placeholder="New Password" required class="bx--text-input" style="margin-bottom: 10px; width: 100%;" />
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required class="bx--text-input" style="margin-bottom: 10px; width: 100%;" />
    <button type="submit" class="bx--btn bx--btn--primary" style="width: 100%;">Reset Password</button>
  </form>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
$(document).ready(function() {
  // --- 1. Get token from query string ---
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if(!token){
    Swal.fire("Error", "Token missing. Please use the link from your email.", "error")
      .then(()=> window.location.href = "/login.html");
    return;
  }

  // --- 2. Handle form submit ---
  $('#resetForm').on('submit', function(e){
    e.preventDefault();

    const newPassword = $('#newPassword').val();
    const confirmPassword = $('#confirmPassword').val();

    if(newPassword !== confirmPassword){
      Swal.fire("Error", "Passwords do not match.", "error");
      return;
    }

    $.ajax({
      url: "https://api.pedalplex.com/USER_RESET_PASSWORD.php",
      method: "POST",
      contentType: "application/json",
      dataType: "json",
      data: JSON.stringify({
        token: token,
        new_password: newPassword
      }),
      success: function(res){
        if(res.success){
          Swal.fire("Success", "Password updated! You can now login.", "success")
            .then(()=> window.location.href = "/login.html");
        } else if(res.expired){
          Swal.fire("Error", "The reset link has expired.", "error")
            .then(()=> window.location.href = "/forgot_password.html");
        } else {
          Swal.fire("Error", "Invalid token or user.", "error");
        }
      },
      error: function(xhr){
        let msg = "Server error. Please try again.";
        try {
          const json = JSON.parse(xhr.responseText);
          if(json.error) msg = json.error;
        } catch{}
        Swal.fire("Error", msg, "error");
      }
    });

  });
});
</script>

</body>
</html>
