<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>404 | PedalPlex</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/carbon-components.min.css" />
  <link rel="stylesheet" href="css/style.css" />

  <!-- JS (defer = no render blocking) -->
  <script defer src="https://unpkg.com/carbon-components/scripts/carbon-components.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BX9P5WN5HH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BX9P5WN5HH');
  </script>

  <!-- Global vars -->
  <script>
    window.PEDAL_ID = "Gear 404";
    window.FXDB_URL = "";
    window.SUBPLEX_EDIT_MODE = false;
  </script>

</head>

<body>

  <div id="catalog">
    <div class="gear-item" data-id="Gear 404"></div>
  </div>

  <div id="page-content" style="padding-top:16px!important;">

    <div id="pedalboard-controls" style="display:flex;align-items:center;gap:8px;width:100%;">

      <a id="backToCatalog" href="#" class="bx--btn bx--btn--tertiary">
        Back to Catalog
        <svg width="16" height="16" viewBox="0 0 32 32" class="bx--btn__icon">
          <path d="M14 26L15.41 24.59 7.83 17 28 17 28 15 7.83 15 15.41 7.41 14 6 4 16 14 26z"></path>
        </svg>
      </a>

    </div>

    <br>

    <h1 id="gearName" style="text-align:center;font-size:2.1rem;font-weight:400">
      Ooops...
    </h1>

    <br>

    <h2 style="text-align:center;font-size:1.3rem;font-weight:400">
      Error 404
    </h2>

    <br><br>

    <div id="preset-wrapper" style="position:relative;min-height:200px;">

      <div id="presetSpinner" style="position:absolute;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;">
        <div class="bx--loading" role="status">
          <svg class="bx--loading__svg" viewBox="-75 -75 150 150">
            <circle class="bx--loading__background" cx="0" cy="0" r="37.5"></circle>
            <circle class="bx--loading__stroke" cx="0" cy="0" r="37.5"></circle>
          </svg>
        </div>
      </div>

      <div id="preset"></div>
      <div id="results"></div>

    </div>

    <br><br>

    <h2 style="text-align:center;font-size:1.3rem;font-weight:400">
      Why am I seeing this?
    </h2>

    <br>

    <p style="max-width:70%;margin:auto;text-align:center;">
      You are seeing this because the gear you were looking for is not available on PedalPlex.<br>Just add your own gear with the <strong>Add gear</strong> button on the catalog page!
      <br><br>

      <span style="font-size:12px" class="bx--tag bx--tag--purple">404</span>
      <span style="font-size:12px" class="bx--tag bx--tag--teal">404</span>
    </p>

    <!-- APP SCRIPTS -->
    <script defer src="helpers.js"></script>
    <script defer src="utils.js"></script>
    <script defer src="subplexes.js"></script>
    <script defer src="fullscreen-menu.js"></script>
    <!-- <script defer src="add-to-rig.js"></script> -->
    <script defer src="nav-view.js"></script>
    <script defer src="view.js"></script>

  </div>

  <!-- MAIN INIT -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      // Show page
      const page = document.getElementById('page-content');
      if (page) page.style.display = 'block';

      // Auth (fetch instead of jQuery)
      const token = localStorage.getItem('authToken');

      function startAppAs(role, userInfo = {}) {
        window.currentUser = Object.assign({ role }, userInfo);
        if (typeof initNavCatalog === 'function') {
          initNavCatalog(role);
        }
      }

      if (!token) {
        startAppAs('guest');
      } else {
        fetch('https://api.pedalplex.com/USER_CHECK_AUTH_JWT.php', {
          headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(user => startAppAs(user.role, user))
        .catch(() => {
          localStorage.removeItem('authToken');
          startAppAs('guest');
        });
      }

      // Spinner logic (robust)
      const preset = document.getElementById("preset");
      const spinner = document.getElementById("presetSpinner");

      if (preset && spinner) {

        const hide = () => spinner.style.display = "none";

        const observer = new MutationObserver(() => {
          if (preset.children.length > 0) {
            hide();
            observer.disconnect();
          }
        });

        observer.observe(preset, { childList: true });

        // fallback anti-stuck
        setTimeout(hide, 5000);
      }

    });
  </script>

  <script>
    document.getElementById('backToCatalog')?.addEventListener('click', function (e) {
        e.preventDefault();

        if (document.referrer && window.history.length > 1) {
            window.history.back();
        } else {
            // fallback se l'utente entra diretto nella pagina
            window.location.href = 'gears';
        }
    });
  </script>



</body>
</html>
