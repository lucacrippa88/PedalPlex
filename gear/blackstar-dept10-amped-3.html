    <script>
        $(document).ready(function () {

            if (window.location.protocol === 'file:') {

                alert('Please run this app via a local HTTP server.');

                $('#page-content').hide();
                return;

            }

            const token = localStorage.getItem('authToken');

            function startAppAs(role, userInfo = {}) {

                $('#page-content').show();

                window.currentUser = Object.assign({
                    role
                }, userInfo);

                // if (typeof initNavCatalog === 'function') initNavCatalog(role);
                // if (typeof initCatalog === 'function') initCatalog(role);
                if (typeof initNavCatalog === 'function') initNavCatalog(role);

            }

            if (!token) {

                startAppAs('guest');
                return;

            }

            $.ajax({

                url: 'https://api.pedalplex.com/USER_CHECK_AUTH_JWT.php',
                method: 'GET',
                dataType: 'json',
                headers: {
                    'Authorization': 'Bearer ' + token
                },

                success: function (userFromServer) {

                    startAppAs(userFromServer.role, userFromServer);

                },

                error: function () {

                    localStorage.removeItem('authToken');
                    startAppAs('guest');

                }

            });

        });
    </script>
